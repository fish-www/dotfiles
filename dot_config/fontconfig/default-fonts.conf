<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>

    <!-- sans-serif -->
    <match target="pattern">
        <test name="family">
            <string>sans-serif</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>0xProto Nerd Font Mono</string>
            <string>Noto Sans CJK SC</string>
            <string>Noto Color Emoji</string>
        </edit>
    </match>

    <!-- serif -->
    <match target="pattern">
        <test name="family">
            <string>serif</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>0xProto Nerd Font Mono</string>
            <string>Noto Serif CJK SC</string>
            <string>Noto Color Emoji</string>
        </edit>
    </match>

    <!-- monospace -->
    <match target="pattern">
        <test name="family">
            <string>monospace</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>0xProto Nerd Font Mono</string>
            <string>Noto Sans Mono CJK SC</string>
            <string>Noto Color Emoji</string>
        </edit>
    </match>

    <!-- CJK -->

    <!-- zh-HK -->
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>zh-HK</string>
        </test>
        <test name="family">
            <string>Noto Sans CJK SC</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Noto Sans CJK HK</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>zh-HK</string>
        </test>
        <test name="family">
            <string>Noto Serif CJK SC</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Noto Serif CJK TC</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>zh-HK</string>
        </test>
        <test name="family">
            <string>Noto Sans Mono CJK SC</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Noto Sans Mono CJK HK</string>
        </edit>
    </match>

    <!-- zh-TW -->
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>zh-TW</string>
        </test>
        <test name="family">
            <string>Noto Sans CJK SC</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Noto Sans CJK TC</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>zh-TW</string>
        </test>
        <test name="family">
            <string>Noto Serif CJK SC</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Noto Serif CJK TC</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>zh-TW</string>
        </test>
        <test name="family">
            <string>Noto Sans Mono CJK SC</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Noto Sans Mono CJK TC</string>
        </edit>
    </match>

    <!-- ja -->
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>ja</string>
        </test>
        <test name="family">
            <string>Noto Sans CJK SC</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Noto Sans CJK JP</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>ja</string>
        </test>
        <test name="family">
            <string>Noto Serif CJK SC</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Noto Serif CJK JP</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>ja</string>
        </test>
        <test name="family">
            <string>Noto Sans Mono CJK SC</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Noto Sans Mono CJK JP</string>
        </edit>
    </match>

    <!-- ko -->
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>ko</string>
        </test>
        <test name="family">
            <string>Noto Sans CJK SC</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Noto Sans CJK KR</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>ko</string>
        </test>
        <test name="family">
            <string>Noto Serif CJK SC</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Noto Serif CJK KR</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>ko</string>
        </test>
        <test name="family">
            <string>Noto Sans Mono CJK SC</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Noto Sans Mono CJK KR</string>
        </edit>
    </match>

    <!-- en -->
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>en</string>
        </test>
        <test name="family" compare="contains">
            <string>Noto Sans CJK</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>0xProto Nerd Font Mono</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>en</string>
        </test>
        <test name="family" compare="contains">
            <string>Noto Serif CJK</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>0xProto Nerd Font Mono</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="lang" compare="contains">
            <string>en</string>
        </test>
        <test name="family" compare="contains">
            <string>Noto Sans Mono CJK</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>0xProto Nerd Font Mono</string>
        </edit>
    </match>

</fontconfig>